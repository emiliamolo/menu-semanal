{% extends "layout.html" %}

{% block title %}
    Registrarse
{% endblock %}

{% block main %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-7">
    <form action="/registrarse" method="post" class="card shadow-lg p-4 border-0 bg-light">
        <h4 class="mb-4 text-center fw-semibold">Crear nuevo usuario</h4>
        <div class="form-group mb-3">
            <input autocomplete="off" autofocus class="form-control" name="usuario" placeholder="Usuario" type="text"required>
        </div>
        <div class="form-group mb-3">
            <input autocomplete="off" autofocus class="form-control" name="mail" placeholder="Correo electrónico" type="email" required>
        </div>
        <div class="form-group mb-3">
            <input class="form-control" name="contraseña" placeholder="Contraseña" type="password" required>
        </div>
        <div class="form-group mb-3">
            <input class="form-control" name="confirmacion" placeholder="Confirme su contraseña" type="password" required>
        </div>
        <button class="btn btn-primary" type="submit">Registrarse</button>
    </form>

        </div>
    </div>
</div>
{% endblock %}
